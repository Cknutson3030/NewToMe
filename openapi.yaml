openapi: 3.1.0
info:
  title: NewToMe API
  version: 1.0.0
  description: Phase 1 backend API for listings and listing images.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Listings
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          nullable: true
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
    ListingImage:
      type: object
      required:
        - id
        - listing_id
        - owner_user_id
        - storage_path
        - image_url
        - sort_order
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        storage_path:
          type: string
        image_url:
          type: string
        sort_order:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Listing:
      type: object
      required:
        - id
        - owner_user_id
        - title
        - status
        - is_deleted
        - created_at
        - updated_at
        - listing_images
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        category:
          type: string
          nullable: true
        item_condition:
          type: string
          nullable: true
        location_city:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, sold, deleted]
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        listing_images:
          type: array
          items:
            $ref: "#/components/schemas/ListingImage"
    ListingListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        meta:
          type: object
          required: [limit, offset, count]
          properties:
            limit:
              type: integer
            offset:
              type: integer
            count:
              type: integer
    ListingResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Listing"
    ListingCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 160
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0
        category:
          type: string
          maxLength: 120
        item_condition:
          type: string
          maxLength: 120
        location_city:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [active, inactive, sold]
    ListingUpdateRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          maxLength: 160
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0
        category:
          type: string
          maxLength: 120
        item_condition:
          type: string
          maxLength: 120
        location_city:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [active, inactive, sold]
    ListingImageUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListingImage"
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /listings:
    get:
      tags: [Listings]
      summary: List public active listings
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: item_condition
          schema:
            type: string
        - in: query
          name: location_city
          schema:
            type: string
        - in: query
          name: min_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: max_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [created_at, price, title]
            default: created_at
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Listings]
      summary: Create listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingCreateRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings/{id}:
    get:
      tags: [Listings]
      summary: Get one public active listing
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Listings]
      summary: Update listing (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdateRequest"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Listings]
      summary: Soft delete listing (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Listing soft deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings/{id}/images:
    post:
      tags: [Listings]
      summary: Upload images to listing (owner only, max 5 per listing)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Images uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingImageUploadResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
