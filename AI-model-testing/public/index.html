<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Model Testing</title>
    <style>
      body{font-family:system-ui,Arial;margin:16px}
      .drop{border:2px dashed #aaa;padding:16px;min-height:140px}
      img{width:80px;height:80px;object-fit:cover;margin-right:8px}
      pre{background:#f6f8fa;padding:12px;border-radius:6px}
    </style>
  </head>
  <body>
    <h2>AI Model Testing — Image Analysis</h2>

    <label>Product:
      <select id="product">
        <option>ChatGPT</option>
        <option>Gemini</option>
        <option>Claude</option>
        <option>Grok</option>
      </select>
    </label>

    <label style="margin-left:12px">Model:
      <select id="model"></select>
    </label>

    <div id="drop" class="drop" ondrop="app.onDrop(event)" ondragover="app.onDragOver(event)">
      <p>Drag & drop images here, or <input id="file" type="file" accept="image/*" multiple onchange="app.onFileChange(event)"></p>
      <div id="thumbs" style="display:flex;margin-top:8px"></div>
    </div>

    <button id="submit" onclick="app.submit()" style="margin-top:12px">Submit</button>

    <h3>Result</h3>
    <div><strong>Product/Model:</strong> <span id="meta"></span></div>
    <div><strong>Processing time (ms):</strong> <span id="time"></span></div>
    <h4>AI Response</h4>
    <pre id="response">(no response yet)</pre>

    <script src="/app.js"></script>
  </body>
</html>
